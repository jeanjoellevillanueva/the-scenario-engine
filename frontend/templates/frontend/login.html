<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto flex min-h-screen max-w-6xl items-stretch px-4 py-8 sm:px-6 lg:px-8">
      <div class="flex w-full items-center justify-center">
        <div class="w-full max-w-md">
          <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200 sm:p-8">
            <div class="mb-6">
              <h1 class="text-2xl font-semibold tracking-tight">Sign in</h1>
              <p class="mt-1 text-sm text-slate-600">
                Use your email and password or continue with Google.
              </p>
            </div>

            <div
              id="alert"
              class="mb-4 {% if not auth_error %}hidden{% endif %} rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-800"
            >{% if auth_error %}{{ auth_error }}{% endif %}</div>

            <form id="login-form" class="space-y-4">
              <div>
                <label class="mb-1 block text-sm font-medium text-slate-700" for="email">
                  Email
                </label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  required
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200"
                  placeholder="you@example.com"
                />
              </div>

              <div>
                <label class="mb-1 block text-sm font-medium text-slate-700" for="password">
                  Password
                </label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  required
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200"
                  placeholder="••••••••"
                />
              </div>

              <button
                id="login-submit"
                type="submit"
                class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-200 disabled:cursor-not-allowed disabled:opacity-60"
              >
                Sign in
              </button>
            </form>

            <div class="my-6 flex items-center gap-3">
              <div class="h-px w-full bg-slate-200"></div>
              <div class="text-xs font-medium text-slate-500">OR</div>
              <div class="h-px w-full bg-slate-200"></div>
            </div>

            <div class="space-y-3">
              <a
                href="{{ google_login_url }}"
                class="inline-flex w-full items-center justify-center gap-3 rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-200"
              >
                <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
              </a>
              <p class="text-center text-xs text-slate-500">
                By continuing, you agree to our terms.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        function showError(message) {
          $("#alert").text(message).removeClass("hidden");
        }

        function clearError() {
          $("#alert").addClass("hidden").text("");
        }

        function setLoading(isLoading) {
          $("#login-submit").prop("disabled", isLoading);
          $("#login-submit").text(isLoading ? "Signing in..." : "Sign in");
        }

        function storeTokens(data) {
          localStorage.setItem("access", data.access);
          localStorage.setItem("refresh", data.refresh);
        }

        function goDashboard() {
          window.location.href = "{{ dashboard_url|escapejs }}";
        }

        function onJwtSuccess(data, email) {
          storeTokens(data);
          if (email) {
            localStorage.setItem("user_email", email);
          }
          goDashboard();
        }

        window.addEventListener("load", function () {
          if (localStorage.getItem("access")) {
            goDashboard();
            return;
          }
        });

        $("#login-form").on("submit", function (e) {
          e.preventDefault();
          clearError();
          setLoading(true);

          var email = $("#email").val();
          var password = $("#password").val();

          $.ajax({
            url: "{{ token_url|escapejs }}",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({ email: email, password: password }),
          })
            .done(function (data) {
              onJwtSuccess(data, email);
            })
            .fail(function (xhr) {
              var detail =
                (xhr.responseJSON && (xhr.responseJSON.detail || xhr.responseJSON.error)) ||
                "Invalid credentials.";
              showError(detail);
            })
            .always(function () {
              setLoading(false);
            });
        });
      })();
    </script>
  </body>
</html>
