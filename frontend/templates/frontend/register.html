<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto flex min-h-screen max-w-6xl items-stretch px-4 py-8 sm:px-6 lg:px-8">
      <div class="flex w-full items-center justify-center">
        <div class="w-full max-w-md">
          <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200 sm:p-8">
            <div class="mb-6">
              <h1 class="text-2xl font-semibold tracking-tight">Create account</h1>
              <p class="mt-1 text-sm text-slate-600">
                Create an account with your email and password.
              </p>
            </div>

            <div
              id="alert"
              class="mb-4 hidden rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-800"
            ></div>

            <form id="register-form" class="space-y-4">
              <div>
                <label class="mb-1 block text-sm font-medium text-slate-700" for="email">
                  Email
                </label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  required
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200"
                  placeholder="you@example.com"
                />
              </div>

              <div>
                <label class="mb-1 block text-sm font-medium text-slate-700" for="password">
                  Password
                </label>
                <div class="relative">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="new-password"
                    required
                    class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 pr-10 text-sm shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200"
                    placeholder="••••••••"
                  />
                  <button
                    id="toggle-password"
                    type="button"
                    class="absolute inset-y-0 right-0 inline-flex items-center justify-center rounded-r-lg px-3 text-slate-500 hover:text-slate-700 focus:outline-none focus:ring-4 focus:ring-slate-200"
                    aria-label="Show password"
                  >
                    <svg
                      class="h-5 w-5"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M2 12C3.6 7.5 7.5 5 12 5C16.5 5 20.4 7.5 22 12C20.4 16.5 16.5 19 12 19C7.5 19 3.6 16.5 2 12Z"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>
                </div>
              </div>

              <div>
                <label class="mb-1 block text-sm font-medium text-slate-700" for="password_confirm">
                  Confirm password
                </label>
                <div class="relative">
                  <input
                    id="password_confirm"
                    name="password_confirm"
                    type="password"
                    autocomplete="new-password"
                    required
                    class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 pr-10 text-sm shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200"
                    placeholder="••••••••"
                  />
                  <button
                    id="toggle-password-confirm"
                    type="button"
                    class="absolute inset-y-0 right-0 inline-flex items-center justify-center rounded-r-lg px-3 text-slate-500 hover:text-slate-700 focus:outline-none focus:ring-4 focus:ring-slate-200"
                    aria-label="Show confirm password"
                  >
                    <svg
                      class="h-5 w-5"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M2 12C3.6 7.5 7.5 5 12 5C16.5 5 20.4 7.5 22 12C20.4 16.5 16.5 19 12 19C7.5 19 3.6 16.5 2 12Z"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>
                </div>
              </div>

              <button
                id="register-submit"
                type="submit"
                class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-200 disabled:cursor-not-allowed disabled:opacity-60"
              >
                Create account
              </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-600">
              Already have an account?
              <a class="font-medium text-slate-900 hover:underline" href="{{ login_url }}">
                Sign in
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        function showError(message) {
          $("#alert").text(message).removeClass("hidden");
        }

        function clearError() {
          $("#alert").addClass("hidden").text("");
        }

        function setLoading(isLoading) {
          $("#register-submit").prop("disabled", isLoading);
          $("#register-submit").text(isLoading ? "Creating..." : "Create account");
        }

        function storeTokens(data) {
          localStorage.setItem("access", data.access);
          localStorage.setItem("refresh", data.refresh);
        }

        function goDashboard() {
          window.location.href = "{{ dashboard_url|escapejs }}";
        }

        $("#register-form").on("submit", function (e) {
          e.preventDefault();
          clearError();
          setLoading(true);

          var email = $("#email").val();
          var password = $("#password").val();
          var passwordConfirm = $("#password_confirm").val();

          if (password !== passwordConfirm) {
            showError("Passwords do not match.");
            setLoading(false);
            return;
          }

          $.ajax({
            url: "{{ register_api_url|escapejs }}",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({ email: email, password: password }),
          })
            .done(function (data) {
              storeTokens(data);
              localStorage.setItem("user_email", email);
              goDashboard();
            })
            .fail(function (xhr) {
              var detail =
                (xhr.responseJSON && (xhr.responseJSON.detail || xhr.responseJSON.error)) ||
                (xhr.responseText && xhr.responseText.slice(0, 300)) ||
                ("Registration failed. (" + xhr.status + ")");
              showError(detail);
            })
            .always(function () {
              setLoading(false);
            });
        });

        function togglePassword(inputId, button, showLabel, hideLabel) {
          var input = document.getElementById(inputId);
          var isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          button.setAttribute("aria-label", isHidden ? hideLabel : showLabel);
        }

        $("#toggle-password").on("click", function () {
          togglePassword("password", this, "Show password", "Hide password");
        });

        $("#toggle-password-confirm").on("click", function () {
          togglePassword("password_confirm", this, "Show confirm password", "Hide confirm password");
        });
      })();
    </script>
  </body>
</html>
